name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Les tests ne couvrent que la logique (core, riot_cloud) : aucune
      # dépendance graphique (customtkinter, pystray) n'est nécessaire.
      - name: Install pytest
        run: pip install pytest
      - name: Run tests
        run: python -m pytest -q
